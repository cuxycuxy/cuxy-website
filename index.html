<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuxy – Mobile & Web Apps for Small Businesses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 2.5rem;
    }
    .description {
      font-size: 1rem;
      color: #aaa;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .contact {
      font-size: 0.9rem;
      color: #666;
    }
    .contact a {
      color: #888;
      text-decoration: none;
      border-bottom: 1px solid #444;
    }
  </style>
</head>
<body>
  <div class="logo">Cuxy</div>
  <div class="tagline">Mobile & web apps for small businesses</div>
  <div class="description">
    We build simple, powerful software tools for small businesses. Based in Ireland, serving clients across Europe.
  </div>
  <div class="contact">
    Contact: <a href="mailto:oscar3.alke@gmail.com">oscar3.alke@gmail.com</a>
  </div>
</body>
</html>
